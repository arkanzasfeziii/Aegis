name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. Please describe your idea below.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
      placeholder: "During red team engagements, I often need to..."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the feature you'd like to see.
    validations:
      required: true
  - type: dropdown
    id: module
    attributes:
      label: Related Module
      options:
        - ScanModule (Port Scanner)
        - EnumModule (Enumeration)
        - CredAttackModule (Credential Attacks)
        - LateralModule (Lateral Movement)
        - TunnelModule (C2 Tunneling)
        - IoTModule (IoT/OT)
        - New Module
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions you've considered.
